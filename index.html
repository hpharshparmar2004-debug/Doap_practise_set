<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGCSM Online Examination</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

.login-box,.exam-container,.result-box{
width:95%;
max-width:1200px;
margin:auto;
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}

.start-btn{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

.topbar{
background:#1e3a8a;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
border-radius:5px;
}

.main{
display:flex;
margin-top:20px;
}

.question-section{
flex:3;
padding:20px;
}

.palette{
flex:1;
border-left:2px solid #ddd;
padding:10px;
max-height:600px;
overflow:auto;
}

.palette button{
width:40px;
height:40px;
margin:5px;
border:none;
border-radius:50%;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}

.palette button.answered{
background:green;
}

.option{
display:block;
background:#f1f5f9;
padding:10px;
margin:10px 0;
border-radius:5px;
cursor:pointer;
}

.nav-btns{
margin-top:20px;
}

.nav-btns button{
padding:10px 20px;
margin-right:10px;
border:none;
background:#2563eb;
color:white;
border-radius:5px;
cursor:pointer;
}

#review{
max-height:500px;
overflow:auto;
}

.correct{
color:green;
}

.wrong{
color:red;
}

@media(max-width:768px){
.main{
flex-direction:column;
}
.palette{
border-left:none;
border-top:2px solid #ddd;
}
}
</style>
</head>

<body>

<div class="login-box" id="loginPage">
<h2>RGCSM ONLINE EXAMINATION</h2>

<input type="text" id="username" placeholder="Enter Username (rgcsm001)">
<input type="password" id="password" placeholder="Enter Password">

<button class="start-btn" onclick="login()">Start Exam</button>

<p id="loginMsg" style="color:red;text-align:center;"></p>
</div>

<div class="exam-container" id="examPage" style="display:none;">

<div class="topbar">
<div>Student: <span id="studentName"></span></div>
<div>Time Left: <span id="timer">60:00</span></div>
</div>

<div class="main">

<div class="question-section">
<h3 id="question"></h3>

<div id="options"></div>

<div class="nav-btns">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Save & Next</button>
<button onclick="submitQuiz()">Submit</button>
</div>
</div>

<div class="palette" id="palette"></div>

</div>
</div>

<div class="result-box" id="resultPage" style="display:none;">
<h2>Exam Result</h2>
<h3 id="score"></h3>
<div id="review"></div>
</div>

let current=0;
let answers=new Array(questions.length).fill(null);
let time=3600;

function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

let pattern=/^rgcsm\d{3}$/;

if(pattern.test(u) && p===u.slice(5)){
document.getElementById("loginPage").style.display="none";
document.getElementById("examPage").style.display="block";
document.getElementById("studentName").innerText=u;
loadQuestion();
createPalette();
startTimer();
}else{
document.getElementById("loginMsg").innerText="Invalid Login";
}
}

function loadQuestion(){
document.getElementById("question").innerText=(current+1)+". "+questions[current].q;

let optionsHTML="";

questions[current].o.forEach((opt,index)=>{
optionsHTML+=`
<label class="option">
<input type="radio" name="opt" value="${index}" ${answers[current]==index?"checked":""}>
${opt}
</label>
`;
});

document.getElementById("options").innerHTML=optionsHTML;
updatePalette();
}

function saveAnswer(){
let selected=document.querySelector('input[name="opt"]:checked');
if(selected){
answers[current]=parseInt(selected.value);
}
}

function nextQuestion(){
saveAnswer();
if(current<questions.length-1){
current++;
loadQuestion();
}
}

function prevQuestion(){
saveAnswer();
if(current>0){
current--;
loadQuestion();
}
}

function createPalette(){
let html="";
for(let i=0;i<questions.length;i++){
html+=`<button id="p${i}" onclick="gotoQuestion(${i})">${i+1}</button>`;
}
document.getElementById("palette").innerHTML=html;
}

function gotoQuestion(i){
saveAnswer();
current=i;
loadQuestion();
}

function updatePalette(){
for(let i=0;i<questions.length;i++){
let btn=document.getElementById("p"+i);
if(answers[i]!=null){
btn.classList.add("answered");
}else{
btn.classList.remove("answered");
}
}
}

function startTimer(){
let interval=setInterval(()=>{
time--;

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
`${m}:${s<10?"0":""}${s}`;

if(time<=0){
clearInterval(interval);
submitQuiz();
}
},1000);
}

function submitQuiz(){

saveAnswer();

let score=0;
let review="";

questions.forEach((q,i)=>{

if(answers[i]===q.a){
score++;
review+=`<p class="correct">Q${i+1}: Correct</p>`;
}else{
review+=`<p class="wrong">Q${i+1}: Wrong | Correct Answer: ${q.o[q.a]}</p>`;
}

});

document.getElementById("examPage").style.display="none";
document.getElementById("resultPage").style.display="block";

document.getElementById("score").innerText=
`Your Score: ${score} / ${questions.length}`;

document.getElementById("review").innerHTML=review;
}

</script>
